Outputs:
  RetirementAtUtc:
    Value: !Ref RetirementAt
  ScheduledRepositoryCount:
    Value: '8'
  ScheduledBackupTagCount:
    Value: '80'
  SchedulerRoleArn:
    Value: !GetAtt BackupTagRetirementRole.Arn
