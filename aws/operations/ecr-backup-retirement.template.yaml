AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  One-time retirement of the exact backup-20260711-* ECR tags after the
  30-day migration recovery window. This stack does not change release tags.

Parameters:
  RetirementAt:
    Type: String
    Default: '2026-08-11T00:00:00'
    AllowedPattern: '^2026-08-1[1-9]T[0-2][0-9]:[0-5][0-9]:[0-5][0-9]$'
    Description: UTC one-time Scheduler timestamp, at least 30 days after the July 11 checkpoint.

Resources:
  BackupTagRetirementRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-ecr-backup-retirement-20260711
      Path: /website/operations/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
                aws:SourceArn: !Sub 'arn:${AWS::Partition}:scheduler:${AWS::Region}:${AWS::AccountId}:schedule-group/default'
      Policies:
        - PolicyName: remove-exact-website-backup-tags
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecr:BatchDeleteImage
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/nonogram-solver-lambda'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/shape-analyzer'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/digit-generator-lambda'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/minesweeper-solver'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/whisper-transcribe'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/vgj-chatbot-inference'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/smart-sentence-finder-lambda'
                  - !Sub 'arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/handwriting-rating'
      Tags:
        - Key: Application
          Value: website
        - Key: ManagedBy
          Value: cloudformation
        - Key: Purpose
          Value: migration-backup-retirement

  NonogramBackupRetirement:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: website-ecr-retire-nonogram-backups-20260711
      Description: Remove the 13 exact July 11 Nonogram backup tags after the recovery window.
      ScheduleExpression: !Sub 'at(${RetirementAt})'
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
        Mode: 'OFF'
      State: ENABLED
      Target:
        Arn: !Sub 'arn:${AWS::Partition}:scheduler:::aws-sdk:ecr:batchDeleteImage'
        RoleArn: !GetAtt BackupTagRetirementRole.Arn
        RetryPolicy:
          MaximumEventAgeInSeconds: 86400
          MaximumRetryAttempts: 10
        Input: >-
          {"RepositoryName":"nonogram-solver-lambda","ImageIds":[{"ImageTag":"backup-20260711-0e89f753e16f"},{"ImageTag":"backup-20260711-16638a5fadc3"},{"ImageTag":"backup-20260711-18ebee5c13de"},{"ImageTag":"backup-20260711-19ca266432a5"},{"ImageTag":"backup-20260711-3495621e935d"},{"ImageTag":"backup-20260711-40842f332e51"},{"ImageTag":"backup-20260711-4d742e6b0f51"},{"ImageTag":"backup-20260711-4e7127040c9d"},{"ImageTag":"backup-20260711-7747154af44c"},{"ImageTag":"backup-20260711-91c8b7ab3972"},{"ImageTag":"backup-20260711-d61b843518ac"},{"ImageTag":"backup-20260711-df77092e1eb5"},{"ImageTag":"backup-20260711-e7d30e586dfe"}]}

  ShapeBackupRetirement:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: website-ecr-retire-shape-backups-20260711
      Description: Remove the three exact July 11 Shape backup tags after the recovery window.
      ScheduleExpression: !Sub 'at(${RetirementAt})'
      ScheduleExpressionTimezone: UTC
      FlexibleTimeWindow:
