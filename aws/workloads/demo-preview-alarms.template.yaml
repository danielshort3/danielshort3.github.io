AWSTemplateFormatVersion: '2010-09-09'
Description: Error, throttle, and duration alarms for the ten isolated Preview demo Lambdas.

Parameters:
  AlarmTopicArn:
    Type: String
    AllowedPattern: '^arn:(aws|aws-us-gov|aws-cn):sns:[a-z0-9-]+:[0-9]{12}:[A-Za-z0-9_.-]{1,256}$'
  ShapeFunctionName:
    Type: String
    Default: shape-analyzer-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  SmartSentenceFunctionName:
    Type: String
    Default: smart-sentence-finder-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  NonogramFunctionName:
    Type: String
    Default: nonogram-solver-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  HandwritingFunctionName:
    Type: String
    Default: handwriting-rating-demo-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  DigitFunctionName:
    Type: String
    Default: digit-generator-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  CovidFunctionName:
    Type: String
    Default: covid-outbreak-drivers-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  PizzaFunctionName:
    Type: String
    Default: pizza-tips-predict-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  TargetFunctionName:
    Type: String
    Default: target-empty-package-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  RetailFunctionName:
    Type: String
    Default: retail-loss-sales-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'
  MinesweeperFunctionName:
    Type: String
    Default: minesweeper-solver-preview
    AllowedPattern: '^[A-Za-z0-9_-]{1,56}-preview$'

Resources:
  ShapeErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: website-demo-shape-preview-errors
      AlarmDescription: Shape Preview reported at least one error in five minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{Name: FunctionName, Value: !Ref ShapeFunctionName}]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopicArn]

  ShapeThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: website-demo-shape-preview-throttles
      AlarmDescription: Shape Preview was throttled in the last five minutes.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions: [{Name: FunctionName, Value: !Ref ShapeFunctionName}]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopicArn]

  ShapeDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: website-demo-shape-preview-duration
      AlarmDescription: Shape Preview exceeded 100 seconds in a five-minute period.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions: [{Name: FunctionName, Value: !Ref ShapeFunctionName}]
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlarmTopicArn]

  SmartSentenceErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: website-demo-smart-sentence-preview-errors
