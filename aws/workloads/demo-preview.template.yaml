              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-preview-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/target-empty-package-preview:*'
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${TargetDataBucket.Arn}/target-empty-package/v1/data.json'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: target-empty-package
        - Key: ManagedBy
          Value: cloudformation

  ShapeLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/shape-analyzer-preview
      RetentionInDays: !Ref LogRetentionDays

  SmartSentenceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/smart-sentence-finder-preview
      RetentionInDays: !Ref LogRetentionDays

  NonogramLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/nonogram-solver-preview
      RetentionInDays: !Ref LogRetentionDays

  HandwritingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/handwriting-rating-demo-preview
      RetentionInDays: !Ref LogRetentionDays

  DigitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/digit-generator-preview
      RetentionInDays: !Ref LogRetentionDays

  MinesweeperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/minesweeper-solver-preview
      RetentionInDays: !Ref LogRetentionDays

  CovidLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/covid-outbreak-drivers-preview
      RetentionInDays: !Ref LogRetentionDays

  PizzaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/pizza-tips-predict-preview
      RetentionInDays: !Ref LogRetentionDays

  RetailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/retail-loss-sales-preview
      RetentionInDays: !Ref LogRetentionDays

  TargetLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/target-empty-package-preview
      RetentionInDays: !Ref LogRetentionDays

  ShapeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: shape-analyzer-preview
      Description: Preview copy pinned to the verified 2026-07-11 production image digest.
      PackageType: Image
      Code:
        ImageUri: 886623862678.dkr.ecr.us-east-2.amazonaws.com/shape-analyzer@sha256:78174eb27e07c1c3338bf2ff8a7a8b520cde7cb7191f9dbb160ffaa400cbef38
      Role: !GetAtt ShapeExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 2048
      Timeout: 120
      EphemeralStorage:
        Size: 512
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref ShapeLogGroup
      Environment:
        Variables:
          ALLOWED_ORIGINS: https://danielshort.me,https://www.danielshort.me
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: shape-analyzer
        - Key: ManagedBy
          Value: cloudformation

  SmartSentenceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: smart-sentence-finder-preview
      Description: Preview copy pinned to the verified 2026-07-11 production image digest.
      PackageType: Image
      Code:
        ImageUri: 886623862678.dkr.ecr.us-east-2.amazonaws.com/smart-sentence-finder-lambda@sha256:860926b8441422073686608b44fe9f443efe0be2ad8cc3e1eb55e7efe870750a
      Role: !GetAtt SmartSentenceExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 3008
      Timeout: 120
      EphemeralStorage:
        Size: 1024
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref SmartSentenceLogGroup
      Environment:
        Variables:
          ALLOWED_ORIGINS: https://danielshort.me,https://www.danielshort.me
          # Lambda currently allocates fewer CPU cores than PyTorch detects on
          # its host. Bound native pools to prevent severe oversubscription.
          OMP_NUM_THREADS: '1'
          MKL_NUM_THREADS: '1'
          OPENBLAS_NUM_THREADS: '1'
          NUMEXPR_NUM_THREADS: '1'
          MODEL_NAME: Snowflake/snowflake-arctic-embed-l-v2.0
          SSF_EMBED_BACKEND: hf
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: smart-sentence-finder
        - Key: ManagedBy
          Value: cloudformation

  NonogramFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: nonogram-solver-preview
      Description: Preview copy pinned to the verified 2026-07-11 production image digest.
      PackageType: Image
      Code:
