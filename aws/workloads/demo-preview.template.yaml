  PizzaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-pizza-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
