        RetryPolicy:
          MaximumEventAgeInSeconds: 86400
          MaximumRetryAttempts: 10
        Input: >-
          {"RepositoryName":"shape-analyzer","ImageIds":[{"ImageTag":"backup-20260711-07f13602dcfa"},{"ImageTag":"backup-20260711-18bf222fa295"},{"ImageTag":"backup-20260711-8f33644336f4"}]}

