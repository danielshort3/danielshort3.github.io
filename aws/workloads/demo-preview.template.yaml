        - Key: ManagedBy
          Value: cloudformation

  MinesweeperFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: minesweeper-solver-preview
      Description: Preview copy pinned to the verified 2026-07-11 production image digest; remains unpublished/noindex.
      PackageType: Image
      Code:
        ImageUri: 886623862678.dkr.ecr.us-east-2.amazonaws.com/minesweeper-solver@sha256:bb6189816dd435e439702cafb475a171f2f7877d3319b498ad0c94f5c4e7d63a
      Role: !GetAtt MinesweeperExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 2048
      Timeout: 60
      EphemeralStorage:
        Size: 512
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref MinesweeperLogGroup
      Environment:
        Variables:
          MINE_COUNT: '10'
          GRID_SIZE: '9'
          MODEL_PREFIX: Guesser_tiny_transformer_20251228-005944_final
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: minesweeper-solver
        - Key: ManagedBy
          Value: cloudformation

  CovidFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: covid-outbreak-drivers-preview
      Description: Preview copy of the verified 2026-07-11 production ZIP package.
      PackageType: Zip
      Code:
        S3Bucket: !Ref ArtifactBucketName
        S3Key: !Ref CovidArtifactKey
        S3ObjectVersion: !Ref CovidArtifactObjectVersion
      Runtime: python3.11
      Handler: app.lambda_handler
      Role: !GetAtt CovidExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 512
      Timeout: 10
      EphemeralStorage:
        Size: 512
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref CovidLogGroup
      Environment:
        Variables:
          DATA_BUCKET: !Ref CovidDataBucket
          DATA_PREFIX: covid-outbreak/v1
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: covid-outbreak
        - Key: ManagedBy
          Value: cloudformation

  PizzaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pizza-tips-predict-preview
      Description: Preview copy of the verified 2026-07-11 production ZIP package.
      PackageType: Zip
      Code:
        S3Bucket: !Ref ArtifactBucketName
        S3Key: !Ref PizzaArtifactKey
        S3ObjectVersion: !Ref PizzaArtifactObjectVersion
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt PizzaExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 256
      Timeout: 5
      EphemeralStorage:
        Size: 512
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref PizzaLogGroup
      Environment:
        Variables:
          ALLOWED_ORIGINS: https://danielshort.me,https://www.danielshort.me
          CONFIDENCE_LEVEL: '0.8'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: pizza-tips
        - Key: ManagedBy
