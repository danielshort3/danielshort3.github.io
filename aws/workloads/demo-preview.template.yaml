              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${CovidDataBucket.Arn}/covid-outbreak/v1/*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: covid-outbreak
