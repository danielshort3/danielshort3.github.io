AWSTemplateFormatVersion: '2010-09-09'
Description: Job application tracker API (Cognito + HTTP API + Lambda + DynamoDB + S3).

Parameters:
  ProjectName:
    Type: String
    Default: job-application-tracker
  AllowedOrigins:
    Type: CommaDelimitedList
    Default: "https://danielshort.me,https://www.danielshort.me"
  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment zip.
  LambdaCodeKey:
    Type: String
    Description: S3 key for the Lambda deployment zip.
  LambdaReleaseId:
    Type: String
    Default: initial
    AllowedPattern: '^[A-Za-z0-9._-]+$'
    Description: Change for every uploaded deployment package so CloudFormation publishes and aliases a new immutable version.
  CognitoDomainPrefix:
    Type: String
    Default: job-tracker-auth
  CallbackUrls:
    Type: CommaDelimitedList
    Default: "https://www.danielshort.me/tools/job-application-tracker,https://www.danielshort.me/tools/dashboard"
  LogoutUrls:
    Type: CommaDelimitedList
    Default: "https://www.danielshort.me/tools/job-application-tracker,https://www.danielshort.me/tools/dashboard"
  AlertTopicArn:
    Type: String
    Default: arn:aws:sns:us-east-2:886623862678:website-security-operations
    AllowedPattern: '^arn:(aws|aws-us-gov|aws-cn):sns:[a-z0-9-]+:[0-9]{12}:[A-Za-z0-9_-]+$'
  ReservedConcurrency:
    Type: Number
    Default: 0
    MinValue: 0
    Description: Set to 5 only after the regional Lambda concurrency quota is raised; zero leaves the property unset.
  EnableCanaryAdminPasswordAuth:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Temporary migration-canary switch; keep false outside a controlled validation window.

Conditions:
  HasReservedConcurrency: !Not [!Equals [!Ref ReservedConcurrency, 0]]
  CanaryAdminPasswordAuthEnabled: !Equals [!Ref EnableCanaryAdminPasswordAuth, 'true']

Resources:
  ApplicationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-applications'
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: applicationId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: applicationId
          KeyType: RANGE

  AttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-attachments-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: !Ref AllowedOrigins
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - '*'
            ExposedHeaders:
              - ETag
              - x-amz-request-id
              - x-amz-id-2
            MaxAge: 3000

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub '${ProjectName}-users'
      DeletionProtection: ACTIVE
      MfaConfiguration: OPTIONAL
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_CUSTOM_AUTH
        - !If [CanaryAdminPasswordAuthEnabled, ALLOW_ADMIN_USER_PASSWORD_AUTH, !Ref 'AWS::NoValue']
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs: !Ref CallbackUrls
      LogoutURLs: !Ref LogoutUrls

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  TrackerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/website/${ProjectName}-api-production'
      RetentionInDays: 30

  TrackerFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: JobTrackerLogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${TrackerLogGroup.Arn}:*'
        - PolicyName: JobTrackerDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt ApplicationsTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub '${AttachmentsBucket.Arn}/*'

  TrackerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-api'
      Runtime: nodejs24.x
      Handler: index.handler
      Role: !GetAtt TrackerFunctionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Ref LambdaCodeKey
      Timeout: 60
      ReservedConcurrentExecutions: !If [HasReservedConcurrency, !Ref ReservedConcurrency, !Ref 'AWS::NoValue']
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref TrackerLogGroup
      Environment:
        Variables:
          APPLICATIONS_TABLE: !Ref ApplicationsTable
          ATTACHMENTS_BUCKET: !Ref AttachmentsBucket
          ALLOWED_ORIGINS: !Join [",", !Ref AllowedOrigins]
          PRESIGN_TTL_SECONDS: "900"
          MAX_ATTACHMENT_BYTES: "10485760"
          MAX_ATTACHMENT_COUNT: "12"
          MAX_TAGS: "12"
          MAX_CUSTOM_FIELDS: "12"

  TrackerFunctionVersion:
    Type: AWS::Lambda::Version
    Properties:
      FunctionName: !Ref TrackerFunction
      Description: !Sub 'Immutable Job Tracker release ${LambdaReleaseId} managed by CloudFormation.'

  TrackerFunctionLiveAlias:
    Type: AWS::Lambda::Alias
    Properties:
      FunctionName: !Ref TrackerFunction
      FunctionVersion: !GetAtt TrackerFunctionVersion.Version
      Name: live
      Description: Current known-good Job Tracker release.

  HttpApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/http-api/${ProjectName}-prod'
      RetentionInDays: 30

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${ProjectName}-api'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: !Ref AllowedOrigins
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: prod
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt HttpApiAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","requestTime":"$context.requestTime","routeKey":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","integrationStatus":"$context.integration.status","errorType":"$context.error.responseType"}'
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 20
        ThrottlingRateLimit: 10

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub
        - 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AliasArn}/invocations'
        - AliasArn: !Ref TrackerFunctionLiveAlias
      PayloadFormatVersion: '2.0'

  HttpApiAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: !Sub '${ProjectName}-jwt'
      AuthorizerType: JWT
      IdentitySource:
        - '$request.header.Authorization'
      JwtConfiguration:
        Audience:
          - !Ref UserPoolClient
        Issuer: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'

  AnalyticsSummaryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/summary'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsTimeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/applications-over-time'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsStatusRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/status-breakdown'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsCalendarRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/calendar'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsFunnelRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/funnel'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsTimeInStageRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/time-in-stage'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AnalyticsFollowupsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/analytics/followups'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ApplicationsListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/applications'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ViewsListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/views'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ViewsCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/views'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ViewsDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'DELETE /api/views/{id}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ApplicationsCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/applications'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ApplicationsUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /api/applications/{id}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ApplicationsDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'DELETE /api/applications/{id}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ProspectsListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /api/prospects'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ProspectsCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/prospects'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ProspectsUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'PATCH /api/prospects/{id}'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  ExportsCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/exports'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AttachmentsPresignRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/attachments/presign'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AttachmentsDownloadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/attachments/download'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  AttachmentsZipRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /api/attachments/zip'
      AuthorizationType: JWT
      AuthorizerId: !Ref HttpApiAuthorizer
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TrackerFunctionLiveAlias
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  TrackerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-lambda-errors'
      AlarmDescription: Job Tracker Lambda returned an error.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref TrackerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  TrackerThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-lambda-throttles'
      AlarmDescription: Job Tracker Lambda was throttled.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref TrackerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  TrackerDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-lambda-duration-high'
      AlarmDescription: Job Tracker Lambda duration reached 80 percent of its timeout.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref TrackerFunction
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 48000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

Outputs:
  ApiEndpoint:
    Description: HTTP API base URL.
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  UserPoolId:
    Description: Cognito user pool ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Cognito user pool app client ID.
    Value: !Ref UserPoolClient
  UserPoolDomain:
    Description: Cognito hosted UI domain.
    Value: !Sub '${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com'
  ApplicationsTableName:
    Description: DynamoDB applications table.
    Value: !Ref ApplicationsTable
  AttachmentsBucketName:
    Description: S3 attachments bucket name.
    Value: !Ref AttachmentsBucket
  TrackerFunctionLiveAliasArn:
    Description: Immutable live alias for the Job Tracker API.
    Value: !Ref TrackerFunctionLiveAlias
