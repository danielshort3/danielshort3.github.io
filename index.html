<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daniel Short | Redirecting to Analytics</title>
  <link rel="canonical" href="https://www.danielshort.me/analytics">
  <meta name="description" content="Redirecting to Daniel Short's default data analyst portfolio.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#091F3B">
  <meta http-equiv="refresh" content="0; url=/analytics">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #9da7b3;
      --accent: #58a6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 Inter, Arial, sans-serif;
    }

    .skip-link {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 8px 12px;
      background: #fff;
      color: #000;
      transform: translateY(-200%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .redirect-shell {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .redirect-eyebrow {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 12px;
      font: 600 2rem/1.15 Inter, Inter, Arial, sans-serif;
    }

    p {
      margin: 0 0 12px;
    }

    a {
      color: var(--accent);
    }
  </style>
  <script defer src="dist/site-shell.3d662446.js"></script>
  <script>
    (function redirectToAnalytics() {
      var target = '/analytics' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(target);
    })();
  </script>

  <meta name="twitter:description" content="Redirecting to Daniel Short's default data analyst portfolio.">
  <link rel="stylesheet" href="css/components/destination-analytics.css">
  <link rel="stylesheet" href="css/components/home-proof.css">
  <link rel="stylesheet" href="css/components/jump-panel.css">
  <link rel="stylesheet" href="css/components/certification.css">
  <link rel="stylesheet" href="css/components/work-experience.css">
</head>
<body data-page="redirect" class="site-page redirect-page">
  <a href="#main" class="skip-link">Skip to main content</a>
  <main id="main">
    <section class="redirect-shell" aria-labelledby="redirect-title">
      <p class="redirect-eyebrow">Redirecting</p>
      <h1 id="redirect-title">Taking you to the default analyst site.</h1>
      <p>Redirecting to the analytics portfolio.</p>
      <p><a href="/analytics">Continue to /analytics</a></p>
    </section>
  </main>
</body>
</html>
