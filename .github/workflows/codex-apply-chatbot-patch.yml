name: Codex Apply Chatbot Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-apply-chatbot-patch.yml
      - .codex/chatbot-update.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Apply patch and remove temporary files
        run: |
          set -euo pipefail
          git apply --index .codex/chatbot-update.patch
          git rm .codex/chatbot-update.patch .github/workflows/codex-apply-chatbot-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update chatbot demo to new AWS endpoint"
          git push
