      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-preview-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/retail-loss-sales-preview:*'
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${RetailDataBucket.Arn}/retail-loss-sales/v1/data.json'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: retail-loss-sales
        - Key: ManagedBy
          Value: cloudformation

  TargetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-target-preview-exec
