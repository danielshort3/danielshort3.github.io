      PackageType: Image
      Code:
        ImageUri: 886623862678.dkr.ecr.us-east-2.amazonaws.com/handwriting-rating@sha256:21e441a5d329cf7b9c29bf18c031a9a378a31395bb9bf8889204f06148a1be6b
