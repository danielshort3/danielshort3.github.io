<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
<title id="title">Brand color palette</title>
<desc id="desc">Vector color palette swatch sheet using the supplied brand guide colors.</desc>

<defs>
  <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#010414" flood-opacity="0.13"/>
  </filter>
  <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#010414" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="midnightGrad" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#010414"/>
    <stop offset="0.72" stop-color="#091F3B"/>
    <stop offset="1" stop-color="#0145C8"/>
  </linearGradient>
  <linearGradient id="blueGrad" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#005FED"/>
    <stop offset="1" stop-color="#0145C8"/>
  </linearGradient>
  <linearGradient id="cardGrad" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#FFFFFF"/>
    <stop offset="1" stop-color="#EEF2F7"/>
  </linearGradient>
  <clipPath id="roundClip">
    <rect x="0" y="0" width="100%" height="100%" rx="28"/>
  </clipPath>
  
</defs>

