  MinesweeperExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-minesweeper-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/minesweeper-solver-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: minesweeper-solver
        - Key: ManagedBy
          Value: cloudformation

  CovidExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-covid-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: logs-and-preview-data
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
