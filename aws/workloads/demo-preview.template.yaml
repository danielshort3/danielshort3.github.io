AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Isolated Preview copies of the ten website portfolio demo Lambdas. Image code is
  pinned to the production digests captured on 2026-07-11; ZIP versions enforce the
  captured CodeSha256. This stack deliberately creates no Lambda Function URLs.

Parameters:
  ArtifactBucketName:
    Type: String
    AllowedPattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
    Description: Private, versioned S3 bucket containing the four verified ZIP artifacts.
  CovidArtifactKey:
    Type: String
    MinLength: 1
  CovidArtifactObjectVersion:
    Type: String
    MinLength: 1
  PizzaArtifactKey:
    Type: String
    MinLength: 1
  PizzaArtifactObjectVersion:
    Type: String
    MinLength: 1
  RetailArtifactKey:
    Type: String
    MinLength: 1
  RetailArtifactObjectVersion:
    Type: String
    MinLength: 1
  TargetArtifactKey:
    Type: String
    MinLength: 1
  TargetArtifactObjectVersion:
    Type: String
    MinLength: 1
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [7, 14, 30, 60, 90]

Resources:
  CovidDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'website-covid-outbreak-preview-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: covid-outbreak
        - Key: ManagedBy
          Value: cloudformation

  CovidDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CovidDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt CovidDataBucket.Arn
              - !Sub '${CovidDataBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  RetailDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'website-retail-loss-sales-preview-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: retail-loss-sales
        - Key: ManagedBy
          Value: cloudformation

  RetailDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref RetailDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt RetailDataBucket.Arn
              - !Sub '${RetailDataBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  TargetDataBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'website-target-empty-package-preview-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: target-empty-package
        - Key: ManagedBy
          Value: cloudformation

  TargetDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TargetDataBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt TargetDataBucket.Arn
              - !Sub '${TargetDataBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  ShapeExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-shape-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/shape-analyzer-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: shape-analyzer
        - Key: ManagedBy
          Value: cloudformation

  SmartSentenceExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-smart-sentence-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/smart-sentence-finder-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: smart-sentence-finder
        - Key: ManagedBy
          Value: cloudformation

  NonogramExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-nonogram-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/nonogram-solver-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: nonogram-solver
        - Key: ManagedBy
          Value: cloudformation

  HandwritingExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: website-demo-handwriting-preview-exec
      Path: /website/preview/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/handwriting-rating-demo-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
          Value: preview
        - Key: Workload
          Value: handwriting-rating
