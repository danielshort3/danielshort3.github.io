            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-own-log-group
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/digit-generator-preview:*'
      Tags:
        - Key: Application
          Value: website
        - Key: Environment
