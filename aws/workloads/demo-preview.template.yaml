  DigitFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: digit-generator-preview
      Description: Preview copy pinned to the verified 2026-07-11 production image digest.
      PackageType: Image
      Code:
        ImageUri: 886623862678.dkr.ecr.us-east-2.amazonaws.com/digit-generator-lambda@sha256:b250e895c38c79b8503fafa790ee5fd5b450ad43b9af02e1b954fa2059ab84c4
      Role: !GetAtt DigitExecutionRole.Arn
      Architectures: [x86_64]
      MemorySize: 1024
      Timeout: 60
      EphemeralStorage:
        Size: 512
      TracingConfig:
        Mode: PassThrough
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref DigitLogGroup
      Environment:
        Variables:
          VALUE_MAX: '20'
          VALUE_MIN: '0'
